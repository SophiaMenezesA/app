<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Frases</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#75070C">
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">← voltar</button>
        
        <h2>filosophias</h2>
        
        <div class="gift-box" id="giftBox">
            🎁
        </div>
        
        <button id="abrirBtn" class="action-btn">abrir surpresa</button>
        
        <div id="fraseSorteada" class="frase-sorteada"></div>
        
        <div class="frase-actions" style="display: none;" id="fraseActions">
            <button id="salvarFraseBtn" class="secondary-btn">salvar frase</button>
            <button id="verSalvasBtn" class="secondary-btn">ver salvas</button>
        </div>
    </div>
    
    <div id="frasesSalvasModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>frases salvas</h3>
            <div id="frasesSalvasList"></div>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
