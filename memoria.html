<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Jogo da Memória</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./memoria.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#75070C">
</head>

<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">← voltar</button>

        <h1 class="page-title">Morango Mnemosyne</h1>

        <div class="game-stats">
            <div class="stat">
                <span class="stat-label">🍓 rodada</span>
                <span class="stat-value" id="rodada">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">🎴 pares</span>
                <span class="stat-value" id="paresRestantes">6</span>
            </div>
            <div class="stat">
                <span class="stat-label">⭐ tentativas</span>
                <span class="stat-value" id="tentativas">0</span>
            </div>
        </div>

        <div class="tabuleiro" id="tabuleiro"></div>

        <div class="game-message" id="gameMessage"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="./script.js"></script>
    <script src="./memoria.js"></script>
</body>

</html>
