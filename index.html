<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>morangoAPP</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="morangoAPP">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#75070C">
    <meta name="application-name" content="morangoAPP">
    <link rel="apple-touch-icon" href="icons/app-icon-512.png">
</head>

<body>
    <div class="app-container">

        <!-- Hero Section - Área principal -->
        <div class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">moranguete</h1>
                <p class="hero-subtitle">testando algo novo, espero que seja divertido</p>
            </div>
        </div>

        <!-- Layout de 2 colunas assimétricas -->
        <div class="two-columns">
            <!-- Coluna esquerda - Card vertical -->
            <div class="left-col">
                <div class="vertical-card">
                    <div class="vertical-card-icon">🍓</div>
                    <h3 class="vertical-card-title">sorte do dia</h3>
                    <p class="vertical-card-desc">clique e tenha sua filosophia diária</p>
                    <div class="vertical-card-image"> 
                        <h1>✨</h1>
                    </div>
                    <button class="vertical-card-btn" data-page="frases">ver agora →</button>
                </div>
            </div>

            <!-- Coluna direita - Feed/Lista editorial -->
            <div class="right-col">
                <div class="feed-list">
                    <div class="feed-item" data-page="tickets">
                        <div class="feed-icon">
                            <img src="icons/tickets.png" alt="Tickets">
                        </div>
                        <div class="feed-content">
                            <h4 class="feed-title">seus tickets</h4>
                            <p class="feed-desc">resgate coisinhas legaisss</p>
                        </div>
                        <div class="feed-arrow">→</div>
                    </div>

                    <div class="feed-item" data-page="roleta">
                        <div class="feed-icon">
                            <img src="icons/roleta.png" alt="Roleta">
                        </div>
                        <div class="feed-content">
                            <h4 class="feed-title">Roletinha das decisões</h4>
                            <p class="feed-desc">Respostas rápidas</p>
                        </div>
                        <div class="feed-arrow">→</div>
                    </div>

                    <div class="feed-item" data-page="caracoroa">
                        <div class="feed-icon">
                            <img src="icons/caracoroa.png" alt="Cara ou Coroa">
                        </div>
                        <div class="feed-content">
                            <h4 class="feed-title">cara ou coroa?</h4>
                            <p class="feed-desc">para quando precisar decidir</p>
                        </div>
                        <div class="feed-arrow">→</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!-- Botão de instalar fixo -->
<button id="installAppBtn" class="install-app-btn">🍓 instalar morangoAPP</button>

<script>
    // Botão de instalar - funciona em qualquer navegador
    const installBtn = document.getElementById('installAppBtn');
    let deferredPrompt = null;
    
    // Escuta o evento de instalação
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
    });
    
    // Clique no botão
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('App instalado!');
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        } else {
            // Fallback para navegadores que não suportam o prompt
            alert('🍓 Toque nos 3 pontinhos do seu navegador e selecione "Adicionar à tela inicial"');
        }
    });
    
    // Esconde o botão se o app já estiver instalado
    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });
    
    // Mostra o botão depois de um tempo se não tiver o evento
    setTimeout(() => {
        if (installBtn.style.display !== 'none' && !deferredPrompt) {
            installBtn.style.display = 'flex';
        }
    }, 3000);
</script>

    <script src="./script.js"></script>
</body>

</html>
